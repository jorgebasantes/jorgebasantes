    <h3 class="heading">video gallery</h3>
    <div class="container">
        <div class="main-video">
            <div class="video">
                <video src="images/meentrance.mp4" controls muted autoplay loop></video>
                <h3 class="title">claro que esta loco</h3>
            </div>
        </div>
        <div class="video-list">
            <div class="vid active">
              <video src="images/meentrance.mp4" muted></video>
              <h3 class="title">claro que esta loco</h3>
            </div>
            <div class="vid">
                <video src="images/construction.mp4" muted></video>
                <h3 class="title">construction</h3>
            </div>
            <div class="vid">
                <video src="images/designs.mp4" muted></video>
                <h3 class="title">computer design</h3>
            </div>
            <div class="vid">
                <video src="images/twin.mp4" muted></video>

            </div>

            </div>

                <h3 class="title">mi vida en 1 minuto</h3>
            </div>


        </div>





    </div>


<script>
    let listVideo = document.querySelectorAll('.video-list .vid');
    let mainVideo = document.querySelector('.main-video video');
    let title = document.querySelector('.main-video .title');

    listVideo.forEach(video =>{
         video.onclick = () =>{
             listVideo.forEach(vid => vid.classList.remove('active'));
             video.classList.add('active');
             if(video.classList.contains('active')){
                 let src = video.children[0].getAttribute('src');
                 mainVideo.src = src;
                 let text = video.children[1].innerHTML;
                 title.innerHTML = text;
             };
         };
    });

</script>
